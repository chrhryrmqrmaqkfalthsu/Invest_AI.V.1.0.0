# ============================================================
# 트레이딩 엔진 운영 정책
# ============================================================

# 운영 모드
mode: paper                      # paper | live

# 매매 사이클
cycle:
  interval_seconds: 60           # 1분 주기
  max_symbols: 10                # 동시 운용 최대 종목 수
  market_context_cache_min: 60   # 시장 컨텍스트 캐시 (분)

# 자본 관리
capital:
  reserve_pct: 10                # 예비금 (전체의 10%)
  insufficient_threshold_krw: 50000  # 자본 부족 알림 임계값

# 소액 안전 한도 (초기 운영 전용 - 검증 끝나면 완화 가능)
small_amount_safety:
  enabled: true                       # 활성화 시 아래 한도 모두 강제
  max_shares_per_order: 1             # 주문당 최대 수량
  max_krw_per_order: 30000            # 주문당 최대 금액 (KRW)
  max_total_invested_krw: 60000      # 전체 누적 투자금 (10종목 × 1만원)
  max_orders_per_day: 3               # 일일 최대 주문 횟수
  require_first_order_approval: true  # 봇 첫 주문은 텔레그램 승인 필요  
  daily_loss_limit_krw: 50000         # 일일 누적 손실 절대금액 상한 (KRW)

# 리스크 관리
risk:
  daily_loss_limit_pct: 10       # 일일 손실 한도 (자본 대비)
  position_limit_pct: 30         # 종목당 최대 비중
  total_exposure_pct: 80         # 전체 노출 한도
  consecutive_loss_limit: 3      # 연속 손실 횟수
  cooldown_after_consecutive_loss_hours: 24
  market_score_min_for_buy: 30   # 이 점수 미만이면 신규 매수 차단
  block_buy_on_negative_expectancy: true

# 진입 규칙
entry:
  min_expectancy_pct: 0.0
  min_profit_loss_ratio: 1.3
  cooldown_after_buy_hours: 24       # 동일 종목 매수 후 재매수 대기
  one_position_per_symbol: true       # 한 종목 한 포지션 (추가매수는 별도)
  cooldown_after_loss_hours: 24       # 손실 청산 후 재매수 대기
  cooldown_after_win_hours: 2         # 이익 청산 후 재매수 대기

# 추가매수 (GA가 종목별 학습, 여기는 안전장치)
add_buy:
  enabled: true
  max_total_per_symbol_pct: 30        # 총합도 종목 한도 30% 이내
  block_when_losing: true             # 손실 중 추가매수 금지
  min_cooldown_minutes: 30            # 추가매수 간 최소 간격

# 청산 규칙 (룰북에 없을 시 기본값)
exit:
  default_max_holding_days: 20
  hard_stop_loss_pct: 5               # 비상 손절 (룰북 손절 실패 대비)
  force_close_on_kill: true

# 수수료 / 슬리피지
commission:
  buy_rate: 0.00015
  sell_rate: 0.00015
  slippage_rate: 0.0002
  round_trip_rate: 0.0005             # 백테스트용 통합값

# 학습 파라미터 (GA)
learning:
  generations: 25
  population: 40
  elite_ratio: 0.2
  mutation_rate: 0.15
  seed_pattern_ratio: 0.33
  holding_days_default: 20
  data_years: 5

# 안전 플래그
safety:
  kill_switch: true              # /kill 명령으로 true 변경
  paper_first_days: 0             # 실전 시작 전 페이퍼 강제일수
  initial_manual_approval: true  # 영구 자동 (사용자 확정)
  max_api_errors_per_hour: 5      # 초과 시 일시 정지

# 알림 (텔레그램)
notifications:
  send_on_buy: true
  send_on_sell: true
  send_on_safety_trigger: true
  send_daily_report_at: "22:00"
  timezone: "Asia/Seoul"
  send_weekly_report_day: "sunday"
  send_errors: true

# 백업
backup:
  enabled: true
  daily_at: "03:00"
  retention_days: 30
  log_rotation_days: 30
